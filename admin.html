<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Confirmaciones</title>

<style>

body{
    font-family: Georgia, serif;
    background:#f8f5ef;
    color:#51473d;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.resumen{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#fffaf3;
    border:1px solid #d6cbbb;
    text-align:center;
    padding:30px;
}

.card h2{
    font-size:45px;
    margin-bottom:10px;
    color:#5c573a;
}

.card p{
    font-size:22px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#66613d;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
}

.si{
    color:green;
    font-weight:bold;
}

.no{
    color:red;
    font-weight:bold;
}

@media(max-width:900px){

    .resumen{
        grid-template-columns:1fr 1fr;
    }

}

@media(max-width:600px){

    .resumen{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<h1>Panel de Confirmaciones</h1>

<div class="resumen">

    <div class="card">
        <h2 id="total">0</h2>
        <p>Total</p>
    </div>

    <div class="card">
        <h2 id="si">0</h2>
        <p>Confirmados</p>
    </div>

    <div class="card">
        <h2 id="no">0</h2>
        <p>No asistirán</p>
    </div>

    <div class="card">
        <h2 id="acom">0</h2>
        <p>Acompañantes</p>
    </div>

</div>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Asiste</th>
<th>Acomp.</th>
<th>Mensaje</th>
</tr>
</thead>

<tbody id="tb">
</tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLctZ-7hPLLJ7nMqp5U4FMDbvAPRxu1_w",
  authDomain: "datos-boda-ce3d2.firebaseapp.com",
  projectId: "datos-boda-ce3d2",
  storageBucket: "datos-boda-ce3d2.firebasestorage.app",
  messagingSenderId: "802804747058",
  appId: "1:802804747058:web:434fad98815db6513ce52b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabla = document.getElementById("tb");

let totalRegistros = 0;
let totalSi = 0;
let totalNo = 0;
let totalAcompanantes = 0;

async function cargarDatos() {

    const consulta = await getDocs(
        collection(db, "confirmaciones_boda")
    );

    consulta.forEach((doc) => {

        const data = doc.data();

        totalRegistros++;

        const acompanantes = Number(
            data.acompanantes || 0
        );

        totalAcompanantes += acompanantes;

        if ((data.asiste || "").includes("Sí")) {
            totalSi++;
        } else {
            totalNo++;
        }

        tabla.innerHTML += `
            <tr>
                <td>${data.nombre || ""}</td>

                <td class="${
                    (data.asiste || "").includes("Sí")
                    ? "si"
                    : "no"
                }">

                    ${data.asiste || ""}

                </td>

                <td>${acompanantes}</td>

                <td>${data.mensaje || ""}</td>
            </tr>
        `;

    });

    document.getElementById("total").textContent =
        totalRegistros;

    document.getElementById("si").textContent =
        totalSi;

    document.getElementById("no").textContent =
        totalNo;

    document.getElementById("acom").textContent =
        totalAcompanantes;
}

cargarDatos();

</script>

</body>
</html>
